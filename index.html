<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#141414">
  <meta name="description" content="Zhang Zirui's design portfolio.">
  <title>Zhang Zirui — Portfolio</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #e9e9e6;
      color: #f7f7f5;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    body {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      background: #e9e9e6;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 14px max(18px, env(safe-area-inset-right)) 14px max(18px, env(safe-area-inset-left));
      background: #141414;
      box-shadow: 0 1px 0 rgb(255 255 255 / 10%);
      z-index: 1;
    }

    .identity {
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(17px, 2vw, 21px);
      font-weight: 650;
      letter-spacing: -0.02em;
      white-space: nowrap;
    }

    .subtitle {
      margin: 3px 0 0;
      color: #aaa9a5;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    nav {
      display: flex;
      flex: 0 0 auto;
      gap: 8px;
    }

    a.button {
      display: inline-flex;
      min-height: 40px;
      align-items: center;
      justify-content: center;
      padding: 0 15px;
      border: 1px solid #3e3e3b;
      border-radius: 999px;
      color: #f7f7f5;
      font-size: 13px;
      font-weight: 620;
      line-height: 1;
      text-decoration: none;
      white-space: nowrap;
      transition: background 140ms ease, border-color 140ms ease, color 140ms ease;
    }

    a.button:hover,
    a.button:focus-visible {
      border-color: #777670;
      background: #2a2a28;
      outline: none;
    }

    a.button.primary {
      border-color: #f1f0ea;
      background: #f1f0ea;
      color: #141414;
    }

    a.button.primary:hover,
    a.button.primary:focus-visible {
      border-color: #ffffff;
      background: #ffffff;
    }

    main {
      min-height: 0;
      padding: 10px;
    }

    .viewer {
      width: 100%;
      height: 100%;
      overflow: hidden;
      border: 1px solid #d4d4cf;
      border-radius: 12px;
      background: #ffffff;
      box-shadow: 0 18px 45px rgb(0 0 0 / 10%);
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #ffffff;
    }

    @media (max-width: 640px) {
      header {
        align-items: stretch;
        flex-direction: column;
        gap: 10px;
        padding-top: max(12px, env(safe-area-inset-top));
      }

      nav {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      a.button {
        min-height: 42px;
        padding-inline: 12px;
      }

      main {
        padding: 6px;
        padding-bottom: max(6px, env(safe-area-inset-bottom));
      }

      .viewer {
        border-radius: 8px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      a.button {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="identity">
      <h1>Zhang Zirui</h1>
      <p class="subtitle">Design Portfolio</p>
    </div>
    <nav aria-label="Portfolio actions">
      <a class="button primary" href="Zhang_Zirui_Portfolio.pdf" target="_blank" rel="noopener">Open in new window</a>
      <a class="button" href="Zhang_Zirui_Portfolio.pdf" download="Zhang_Zirui_Portfolio.pdf">Download PDF</a>
    </nav>
  </header>
  <main>
    <div class="viewer">
      <iframe src="Zhang_Zirui_Portfolio.pdf#view=FitH&amp;pagemode=none" title="Zhang Zirui design portfolio PDF" loading="eager"></iframe>
    </div>
  </main>
</body>
</html>
